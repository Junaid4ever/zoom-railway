<!DOCTYPE html>
<html>
<head>
    <title>ZOOM BOT CONTROLLER</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: auto;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-value {
            font-size: 3em;
            font-weight: bold;
            color: #667eea;
        }
        .control-panel {
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
        }
        input, select {
            width: 100%;
            padding: 12px;
            background: #334155;
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        .colab-list, .bot-list {
            background: #1e293b;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .colab-item, .bot-item {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: #334155;
            margin: 10px 0;
            border-radius: 8px;
        }
        .online { color: #4ade80; }
        .busy { color: #fbbf24; }
        .status-badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .status-running { background: #4ade80; color: black; }
        .status-launching { background: #fbbf24; color: black; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 ZOOM BOT CONTROL CENTER</h1>
            <p>Connected Colabs: <span id="totalColabs">0</span> | Active Bots: <span id="totalBots">0</span></p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <div class="stat-value" id="availableSlots">0</div>
                <div>Available Slots</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="activeColabs">0</div>
                <div>Active Colabs</div>
            </div>
        </div>

        <div class="control-panel">
            <h2>🚀 Launch Bots</h2>
            <div class="form-group">
                <label>Meeting ID</label>
                <input type="text" id="meetingId" placeholder="Enter Zoom Meeting ID">
            </div>
            <div class="form-group">
                <label>Passcode (Optional)</label>
                <input type="text" id="passcode" placeholder="Enter passcode">
            </div>
            <div class="form-group">
                <label>Number of Bots</label>
                <input type="number" id="botCount" min="1" value="10">
            </div>
            <div class="form-group">
                <label>Duration (minutes)</label>
                <input type="number" id="duration" min="1" value="60">
            </div>
            <button onclick="launchBots()">LAUNCH BOTS</button>
            <button class="btn-danger" onclick="terminateAll()">TERMINATE ALL</button>
        </div>

        <div class="colab-list">
            <h2>📡 Connected Colabs</h2>
            <div id="colabContainer"></div>
        </div>

        <div class="bot-list">
            <h2>🤖 Active Bots</h2>
            <div id="botContainer"></div>
        </div>
    </div>

    <script>
        const socket = io();
        
        socket.on('connect', () => {
            console.log('Connected to server');
        });

        socket.on('stats_update', (data) => {
            updateUI(data);
        });

        socket.on('error', (data) => {
            alert('Error: ' + data.message);
        });

        function updateUI(data) {
            $('#totalColabs').text(data.total_colabs);
            $('#totalBots').text(data.total_bots);
            
            let available = 0;
            for(let id in data.colabs) {
                available += (10 - (data.colabs[id].busy_workers || 0));
            }
            $('#availableSlots').text(available);
            $('#activeColabs').text(data.total_colabs);

            // Colabs list
            let colabHtml = '';
            for(let id in data.colabs) {
                let c = data.colabs[id];
                let statusClass = c.status === 'online' ? 'online' : 'busy';
                colabHtml += `
                    <div class="colab-item">
                        <span>Colab: ${id.substring(0,8)}...</span>
                        <span>Bots: ${c.busy_workers || 0}/10</span>
                        <span class="${statusClass}">${c.status}</span>
                    </div>
                `;
            }
            $('#colabContainer').html(colabHtml || '<p>No colabs connected</p>');

            // Bots list
            let botHtml = '';
            for(let id in data.bots) {
                let b = data.bots[id];
                let statusClass = b.status === 'running' ? 'status-running' : 'status-launching';
                botHtml += `
                    <div class="bot-item">
                        <span>Bot: ${id}</span>
                        <span>Meeting: ${b.meeting_id}</span>
                        <span class="status-badge ${statusClass}">${b.status}</span>
                        <button onclick="terminateBot('${id}')" style="padding:5px;background:#ef4444;">✕</button>
                    </div>
                `;
            }
            $('#botContainer').html(botHtml || '<p>No active bots</p>');
        }

        function launchBots() {
            socket.emit('launch_bots', {
                meeting_id: $('#meetingId').val(),
                passcode: $('#passcode').val(),
                bot_count: $('#botCount').val(),
                duration: $('#duration').val()
            });
        }

        function terminateAll() {
            if(confirm('Terminate all bots?')) {
                socket.emit('terminate_bots', { meeting_id: 'all' });
            }
        }

        function terminateBot(botId) {
            socket.emit('terminate_bot', { bot_id: botId });
        }

        // Auto refresh
        setInterval(() => {
            socket.emit('request_stats');
        }, 2000);
    </script>
</body>
</html>
